version: "3.9"

services:
  exapi:
    container_name: exapi
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  db:
    image: postgres:16
    container_name: exapi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: exapi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: exapi
    volumes:
      - exapi_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  exapi_data:
